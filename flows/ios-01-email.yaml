# Stage 1 of sign-in: submit the email and stop.
#
# Sign-in is split across two flows because the magic code does not exist yet when this one runs —
# it is emailed only once the address is submitted. The runner fetches it from the inbox in between
# (magic_code.py) and feeds it to ios-02-code.yaml. A single flow could not wait for that.
appId: ${APP_ID}
---
- launchApp:
    clearState: true

# The workflow pre-builds the JS bundle before this runs, so the app opens against a warm Metro.
# The wait is still generous: a cold simulator's first paint is not instant, and the failure mode of
# waiting too long is a slow run, whereas waiting too little throws away a 40-minute build.
- extendedWaitUntil:
    visible: "Phone or email"
    timeout: 240000

- tapOn: "Phone or email"
- inputText: ${EMAIL}
- tapOn: "Continue"
