# Runs the repo's own merge gates (typecheck + related tests) against a fix branch, so a
# PROPOSAL can carry "this exact change passes the gates" as a checkable receipt.
#
# Lives in newdot-evidence (not the App fork) for the same reason the other evidence
# workflows do: it only needs to CHECK OUT the fix branch, so the fork stays clean. Public
# repo => standard runners are free and unlimited, with 16GB RAM (tsc peaks at several GB;
# the autopilot VM has 2 cores / 12GB shared with live services and must never run this).
#
# TYPECHECK IS A DELTA, not an absolute: Expensify/App main is sometimes red on
# `npm run typecheck` (observed live 2026-07-16: TS2304 in Policy/Member.ts on vanilla
# main). An absolute check would fail every proof branch for upstream's breakage and
# false-alarm the operator. The baseline is HEAD^ — the exact commit the one-commit fix
# branch was built on — NOT live upstream main, which moves between branch-cut and this
# run and makes pre-existing errors look "introduced" via line drift (observed on the
# first smoke: same TS2304, shifted line). Error strings are also normalised (line/col
# stripped) so an edit above a pre-existing error in the same file can't fake a delta.
#
# lint-changed is deliberately omitted: it needs history the shallow checkout lacks;
# typecheck + related jest are the gates that catch a broken change.
name: ci-gate

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Repo holding the fix branch (must be public)"
        required: false
        default: "shivang-goliyan/App"
        type: string
      target_ref:
        description: "Branch or SHA of the fix"
        required: true
        type: string
      changed_files:
        description: "Space-separated repo-relative paths the fix touched (for related tests)"
        required: false
        default: ""
        type: string
      base_repo:
        description: "Upstream to diff typecheck errors against"
        required: false
        default: "Expensify/App"
        type: string

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout the fix branch
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.target_ref }}
          fetch-depth: 2   # HEAD^ is the exact commit the fix was built on — the baseline

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck the fix branch
        continue-on-error: true
        run: |
          set +e
          npm run typecheck 2>&1 \
            | grep -oE "[A-Za-z0-9_./-]+\([0-9]+,[0-9]+\): error TS[0-9]+" \
            | sed -E 's/\([0-9]+,[0-9]+\)//' | sort -u > /tmp/branch_errors.txt
          echo "branch errors: $(wc -l < /tmp/branch_errors.txt)"

      - name: Typecheck the baseline (HEAD^, side worktree)
        continue-on-error: true
        run: |
          set +e
          git worktree add --detach /tmp/basewt HEAD^
          ln -s "$PWD/node_modules" /tmp/basewt/node_modules
          (cd /tmp/basewt && npm run typecheck 2>&1) \
            | grep -oE "[A-Za-z0-9_./-]+\([0-9]+,[0-9]+\): error TS[0-9]+" \
            | sed -E 's/\([0-9]+,[0-9]+\)//' | sort -u > /tmp/main_errors.txt
          echo "baseline (HEAD^) errors: $(wc -l < /tmp/main_errors.txt)"

      - name: Related tests for the changed files
        continue-on-error: true
        env:
          CHANGED: ${{ inputs.changed_files }}
        run: |
          set +e
          if [ -z "$CHANGED" ]; then
            echo "no changed_files given — skipping related tests"
            echo "TESTS_RESULT=skipped" >> "$GITHUB_ENV"
          else
            npx jest --findRelatedTests $CHANGED --no-coverage --ci --silent \
              && echo "TESTS_RESULT=pass" >> "$GITHUB_ENV" \
              || echo "TESTS_RESULT=fail" >> "$GITHUB_ENV"
          fi

      # One grep-friendly line the dispatcher parses out of the run logs. The job FAILS on
      # a red delta so the run conclusion is honest.
      - name: Result
        env:
          TR: ${{ env.TESTS_RESULT }}
        run: |
          touch /tmp/branch_errors.txt /tmp/main_errors.txt
          NEW=$(comm -23 /tmp/branch_errors.txt /tmp/main_errors.txt | wc -l)
          BASE=$(wc -l < /tmp/main_errors.txt)
          TESTS="${TR:-skipped}"
          TC=$([ "$NEW" -eq 0 ] && echo pass || echo fail)
          echo "CIGATE: typecheck=$TC tests=$TESTS new_errors=$NEW baseline_errors=$BASE ref=${{ inputs.target_ref }}"
          if [ "$NEW" -gt 0 ]; then
            echo "--- errors introduced by the branch ---"
            comm -23 /tmp/branch_errors.txt /tmp/main_errors.txt
          fi
          [ "$TC" = "pass" ] && [ "$TESTS" != "fail" ]
