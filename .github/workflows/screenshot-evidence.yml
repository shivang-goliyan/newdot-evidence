# Captures PR screenshot evidence so a fix can be evidenced without a Mac and without running the
# app on a memory-constrained laptop.
#
# This belongs in a STANDALONE public repo — NOT in the Expensify/App fork. It only needs to
# *check out* the fix branch, so it leaves no trace on the fork: no branch, no workflow file,
# nothing that can leak into a PR diff. The repo must be public: standard runners (macOS included)
# are free and unlimited on public repos, and metered 10x on private ones.
#
#   gh workflow run screenshot-evidence.yml --repo <you>/newdot-evidence \
#      -f source_repo=shivang-goliyan/App -f target_ref=<fix-branch> -f route=/search \
#      -f platforms=web,macos,ios-native
#
# Secrets required (Settings → Secrets and variables → Actions):
#   EXPENSIFY_EMAIL     the account to sign in as
#   IMAP_USER           mailbox that receives its magic codes (e.g. you@gmail.com)
#   IMAP_APP_PASSWORD   Gmail App Password (a normal password will NOT work)
#
# Use a DEDICATED test Expensify account, not your personal one. The dev server proxies to the
# PRODUCTION API, so this signs into a real account and any action it takes is real. And on a
# public repo, run logs and published evidence are world-readable — never capture anything you
# would not paste into the PR itself.
name: Screenshot evidence

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Repo holding the fix branch (must be public)"
        required: false
        default: "shivang-goliyan/App"
        type: string
      target_ref:
        description: "Branch or SHA of the fix to screenshot"
        required: true
        type: string
      platforms:
        description: "Comma-separated: web, macos, ios-native"
        required: false
        default: "web,macos"
        type: string
      route:
        description: "Route to open after sign-in (e.g. /search)"
        required: false
        default: "/"
        type: string
      viewport:
        description: "Viewport WxH"
        required: false
        default: "1512x982"
        type: string
      record:
        description: "Also record an mp4 of the session"
        required: false
        default: false
        type: boolean

permissions:
  # Needed by the publish job: a PR body cannot embed a build artifact, only a URL.
  contents: write

# Every run here signs into the SAME Expensify account and polls the SAME inbox for a magic code.
# Two runs in flight at once therefore race: whichever polls first consumes the code the other is
# waiting for, and the loser dies with "no magic code within 180s" — which looks like a broken
# script but is really a collision. Serialising is not an optimisation, it is a correctness fix.
# cancel-in-progress is false on purpose: a queued run must wait, never kill the one signing in.
concurrency:
  group: expensify-signin
  cancel-in-progress: false

jobs:
  # A matrix leg cannot be skipped with `if`, so the browser legs are computed here instead: asking
  # for ios-native alone must not drag a browser run along with it (and vice versa), or every
  # iteration on one platform pays for the others.
  plan:
    runs-on: ubuntu-latest
    outputs:
      browsers: ${{ steps.pick.outputs.browsers }}
    steps:
      - id: pick
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          legs='[]'
          # The PR template has ONE "MacOS: Chrome / Safari" row, so Chrome satisfies it and a second
          # macOS runner for Safari is wasted. (browser=webkit still works if a Safari-only bug needs it.)
          if [[ ",${PLATFORMS}," == *",web,"* ]]; then
            legs=$(jq -c '. += [{"os":"ubuntu-latest","label":"web-chrome","browser":"chromium","desktop":"false"}]' <<< "$legs")
          fi
          # A viewport screenshot is identical on any OS (no window chrome), so the mac leg also grabs
          # the whole screen: the menu bar and traffic lights are what evidence "on a Mac".
          if [[ ",${PLATFORMS}," == *",macos,"* ]]; then
            legs=$(jq -c '. += [{"os":"macos-latest","label":"macos-chrome","browser":"chromium","desktop":"true"}]' <<< "$legs")
          fi
          echo "browsers=${legs}" >> "$GITHUB_OUTPUT"
          echo "browser legs: ${legs}"

  capture:
    needs: plan
    if: needs.plan.outputs.browsers != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.browsers) }}
    name: ${{ matrix.label }}
    # Free and unlimited on public repos, macOS included — a failed run costs nothing.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout CI scripts (this branch)
        uses: actions/checkout@v4
        with:
          path: ci

      - name: Checkout the fix
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.target_ref }}
          path: app

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      # The dev server binds to dev.new.expensify.com over HTTPS with an mkcert-issued
      # certificate, so the runner needs both the hosts entry and the cert.
      - name: Set up the dev host + certificate
        working-directory: app
        run: |
          echo "127.0.0.1 dev.new.expensify.com" | sudo tee -a /etc/hosts
          if [ "${RUNNER_OS}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libnss3-tools ffmpeg
            curl -sJLO "https://dl.filippo.io/mkcert/latest?for=linux/amd64"
            chmod +x mkcert-v*-linux-amd64
            sudo mv mkcert-v*-linux-amd64 /usr/local/bin/mkcert
          else
            brew install mkcert ffmpeg
          fi
          # Always use the REPO'S OWN script, never a hardcoded cert path: the dev server moved
          # from webpack to rsbuild and the pem location moved with it (config/rsbuild/), so any
          # path we pin here goes stale silently and the server fails to bind.
          npm run setup-https

      # The macOS runner's virtual display defaults to 1024x768, so the browser window is wider
      # than the screen and the desktop proof-shot shows a cropped app. Best-effort: nothing here
      # is fatal, and the (independent) viewport screenshot is full-size either way.
      - name: Widen the macOS display
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          brew install displayplacer
          SCREEN=$(displayplacer list | awk '/Persistent screen id:/ {print $4; exit}')
          displayplacer "id:${SCREEN} res:1920x1080 scaling:off origin:(0,0) degree:0"

      - name: Start the dev server
        working-directory: app
        run: |
          npm run web > "${RUNNER_TEMP}/web.log" 2>&1 &
          for i in $(seq 90); do
            if curl -ksf https://dev.new.expensify.com:8082 > /dev/null; then
              echo "dev server up after ${i}0s"; exit 0
            fi
            sleep 10
          done
          echo "dev server never came up:"; tail -50 "${RUNNER_TEMP}/web.log"; exit 1

      - name: Install Playwright
        working-directory: ci/scripts
        run: |
          npm install
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Capture
        working-directory: ci/scripts
        env:
          EXPENSIFY_EMAIL: ${{ secrets.EXPENSIFY_EMAIL }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          ROUTE: ${{ inputs.route }}
          VIEWPORT: ${{ inputs.viewport }}
          RECORD: ${{ inputs.record }}
          BROWSER: ${{ matrix.browser }}
          LABEL: ${{ matrix.label }}
          DESKTOP: ${{ matrix.desktop }}
          OUT_DIR: ${{ github.workspace }}/screenshots
        run: node capture.mjs

      - name: Dev server log (on failure)
        if: failure()
        run: tail -100 "${RUNNER_TEMP}/web.log" || true

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.label }}
          path: screenshots/
          if-no-files-found: warn
          retention-days: 14

  # iOS: Native — the row that normally forces you to own a Mac.
  #
  # A SIMULATOR build needs no code signing, no certificates and no Apple Developer account
  # (CODE_SIGNING_ALLOWED=NO), and `New Expensify Dev` is a standalone NewDot scheme, so the
  # Mobile-Expensify submodule is never checked out. Upstream builds exactly this scheme/config in
  # .github/workflows/remote-build-ios.yml — but through a paid remote-build service, which we
  # replace with a plain xcodebuild.
  ios-native:
    if: contains(inputs.platforms, 'ios-native')
    name: ios-native
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout CI scripts (this branch)
        uses: actions/checkout@v4
        with:
          path: ci

      - name: Checkout the fix
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.target_ref }}
          path: app

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Unlike web, the native build BAKES its config in at build time (react-native-config), so it
      # needs a .env to exist. Do NOT copy .env.example: it points EXPENSIFY_URL at
      # https://www.expensify.com.dev/ — a LOCAL backend that does not exist on a runner — and
      # sign-in would fail against it. Every key CONFIG.ts reads has a production default, so an
      # almost-empty file reproduces exactly the production config the web leg gets with no .env.
      - name: Write a production .env
        run: printf 'ENVIRONMENT=development\n' > app/.env

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      # The runner's DEFAULT Xcode (26.5) cannot build the vendored `fmt` pod: its clang rejects
      # fmt's consteval format strings ("call to consteval function ... is not a constant
      # expression"). Expensify pins Xcode 26.2 in .github/workflows/remote-build-ios.yml for
      # exactly this reason — match their pin rather than patch a vendored dependency.
      - name: Select Xcode
        run: |
          ls -d /Applications/Xcode*.app
          DEV="/Applications/Xcode_26.2.app/Contents/Developer"
          if [ ! -d "$DEV" ]; then
            # Fall back to the OLDEST installed Xcode 26: the failure is a too-NEW clang, so the
            # newest image default is the one thing we know does not work.
            echo "::warning::Xcode_26.2 is not on this image; falling back to the oldest Xcode 26"
            DEV="$(ls -d /Applications/Xcode_26*.app | sort -V | head -1)/Contents/Developer"
          fi
          sudo xcode-select -s "$DEV"
          echo "DEVELOPER_DIR=$DEV" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: app/ios/Pods
          key: pods-${{ hashFiles('app/ios/Podfile.lock') }}

      - name: Pod install
        working-directory: app
        # The repo's own script; it needs yq (jq is preinstalled on the runner image).
        run: |
          brew install yq
          npm run pod-install

      # The first build is the slow one (~40 min). Caching DerivedData makes every later run cheap,
      # which is what makes iterating on the sign-in automation affordable.
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dd
          key: dd-${{ hashFiles('app/ios/Podfile.lock') }}-${{ inputs.target_ref }}
          restore-keys: |
            dd-${{ hashFiles('app/ios/Podfile.lock') }}-
            dd-

      # Booting BEFORE the build so the build can target this exact device. A
      # 'generic/platform=iOS Simulator' destination compiles every simulator arch — including the
      # x86_64 slice, which is dead weight on an Apple Silicon runner and a common way for a pod to
      # fail to build. Targeting the booted device + ONLY_ACTIVE_ARCH builds arm64 alone.
      - name: Boot a simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices[][] | select(.name | test("iPhone 1[5-9]"))][0].udid')
          [ -n "$UDID" ] && [ "$UDID" != "null" ] || { echo "no iPhone simulator available"; exit 1; }
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

          xcrun simctl boot "$UDID"
          # Opening Simulator.app gives the device a real window; the app renders headlessly either
          # way, but a visible window is what lets `screencapture` prove this ran on a Mac if wanted.
          open -a Simulator --args -CurrentDeviceUDID "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Build for the simulator
        working-directory: app
        run: |
          # Full log to a file, never to a pipe: `| tail` silently discards the `error:` lines and
          # leaves only trailing warnings, which is worse than no log at all.
          set +e
          xcodebuild \
            -workspace ios/NewExpensify.xcworkspace \
            -scheme "New Expensify Dev" \
            -configuration DebugDevelopment \
            -sdk iphonesimulator \
            -destination "id=${SIM_UDID}" \
            -derivedDataPath "${RUNNER_TEMP}/dd" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build > "${RUNNER_TEMP}/xcodebuild.log" 2>&1
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then
            echo "===== errors ====="
            grep -nE "error:|error " "${RUNNER_TEMP}/xcodebuild.log" | head -40
            echo "===== last 60 lines ====="
            tail -60 "${RUNNER_TEMP}/xcodebuild.log"
            exit $STATUS
          fi
          echo "build ok"

      - name: Upload the build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: warn

      - name: Install the app
        run: |
          APP=$(find "${RUNNER_TEMP}/dd/Build/Products" -maxdepth 2 -name "*.app" | head -1)
          [ -n "$APP" ] || { echo "no .app was produced"; exit 1; }
          APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Info.plist")
          echo "built $APP ($APP_ID)"
          echo "APP_ID=$APP_ID" >> "$GITHUB_ENV"
          xcrun simctl install "${SIM_UDID}" "$APP"

      # A DebugDevelopment build does not embed the JS bundle — it pulls it from Metro at runtime.
      - name: Start Metro and pre-build the bundle
        working-directory: app
        run: |
          npm start > "${RUNNER_TEMP}/metro.log" 2>&1 &
          for i in $(seq 60); do
            curl -sf http://localhost:8081/status > /dev/null && { echo "metro up"; break; }
            sleep 5
          done
          curl -sf http://localhost:8081/status > /dev/null || {
            echo "metro never came up:"; tail -40 "${RUNNER_TEMP}/metro.log"; exit 1; }

          # Build the bundle HERE rather than letting the app trigger it on launch. A cold bundle of
          # an app this size takes minutes ("Bundling 67%..." was still on screen when the previous
          # run's sign-in timed out), and that is dead time Maestro would have to sit through with a
          # wait long enough to be indistinguishable from a hang. Requesting it up front means the
          # app opens against a warm bundler and renders immediately.
          echo "pre-building the JS bundle (cold; expect several minutes)"
          time curl -sS --max-time 1800 -o /dev/null -w 'bundle: HTTP %{http_code} in %{time_total}s\n' \
            'http://localhost:8081/index.bundle?platform=ios&dev=true&minify=false'

      - name: Install Maestro
        # Playwright cannot drive a native app. Maestro taps and types by visible text, which
        # survives layout churn far better than pixel coordinates.
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Proof of what the app actually looks like before any automation touches it. Without this, a
      # sign-in failure is ambiguous — a wrong selector and an app still stuck on a loading screen
      # look identical from the logs. (That ambiguity cost a whole run: the "selector" failure turned
      # out to be "Bundling 67%...".)
      - name: Screenshot the launched app (pre-sign-in)
        run: |
          mkdir -p screenshots
          xcrun simctl launch "${SIM_UDID}" "${APP_ID}" || true
          # The pre-warm curl does not spare the app its own bundling pass (it requests the bundle
          # with different query params, so it misses that cache entry). 25s was not enough — the
          # last run photographed "Bundling 88%". Give it a real budget; this also leaves Metro warm
          # for the relaunch Maestro does next, which is the launch that has to reach the login screen.
          sleep 150
          xcrun simctl io "${SIM_UDID}" screenshot screenshots/ios-native-prelogin.png
          xcrun simctl terminate "${SIM_UDID}" "${APP_ID}" || true

      - name: Sign in
        id: signin
        # NOT fatal on purpose: if a selector has drifted, we still want the screenshot and the view
        # hierarchy Maestro dumps on failure — that is what tells us the real selector, and a 40-min
        # build is too expensive to spend on a run that tells us nothing.
        continue-on-error: true
        # The flows have their own per-command timeouts, but those do not bound Maestro's iOS DRIVER,
        # which can hang bringing up its XCUITest runner. Without a ceiling here that hang eats the
        # entire 120-minute job and produces no screenshot at all — which is exactly what happened.
        timeout-minutes: 20
        env:
          EXPENSIFY_EMAIL: ${{ secrets.EXPENSIFY_EMAIL }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          MAESTRO_CLI_NO_ANALYTICS: "1"
          # The driver handshake is the part that hangs; bound it explicitly rather than forever.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "120000"
        run: |
          # Stamp BEFORE submitting the address: any code older than this is from a previous run.
          REQUESTED_AT=$(date +%s)
          # --device is REQUIRED, not a nicety: with several simulators available Maestro will not
          # pick one, and its iOS driver hangs bringing up the XCUITest runner instead of failing.
          # That hang produces no logs and no view hierarchy, which is exactly what we saw — while
          # the pre-sign-in screenshot proved the app was sitting happily on the login screen.
          maestro --device "${SIM_UDID}" test -e APP_ID="${APP_ID}" -e EMAIL="${EXPENSIFY_EMAIL}" ci/flows/ios-01-email.yaml

          CODE=$(python3 ci/scripts/magic_code.py --since "${REQUESTED_AT}" --timeout 180)
          echo "got magic code from inbox"
          # ::add-mask:: so the code cannot be read out of the public run log.
          echo "::add-mask::${CODE}"
          maestro --device "${SIM_UDID}" test -e APP_ID="${APP_ID}" -e CODE="${CODE}" ci/flows/ios-02-code.yaml

      - name: Screenshot
        run: |
          mkdir -p screenshots
          # simctl captures the whole device frame, which is what the PR template's iOS row shows.
          xcrun simctl io "${SIM_UDID}" screenshot screenshots/ios-native.png
          echo "captured screenshots/ios-native.png"

      - name: Collect Maestro debug output (on sign-in failure)
        if: steps.signin.outcome != 'success'
        timeout-minutes: 5
        continue-on-error: true
        run: |
          echo "::warning::sign-in did not complete — the screenshot shows where it stalled"
          mkdir -p screenshots/maestro-debug
          # Maestro dumps the view hierarchy + its own screenshots here; the hierarchy names the
          # selectors that actually exist on screen.
          cp -R "$HOME/.maestro/tests/"* screenshots/maestro-debug/ 2>/dev/null || true

      - name: Metro log (on failure)
        if: failure()
        run: tail -60 "${RUNNER_TEMP}/metro.log" || true

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-ios-native
          path: screenshots/
          if-no-files-found: warn
          retention-days: 14

  # A PR body cannot embed an artifact — it needs a URL GitHub will render. Publishing to an
  # `evidence` branch yields permanent raw.githubusercontent.com links that outlive artifact
  # retention and depend on no server of ours. One job does it so the matrix cannot race on a push.
  publish:
    needs: [capture, ios-native]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: incoming
          merge-multiple: true

      - name: Publish and print the PR-ready markdown
        env:
          DEST: evidence/${{ inputs.target_ref }}-${{ github.run_id }}
        run: |
          shopt -s nullglob
          # Only publish finished evidence: maestro-debug is a failure dump for us to read in the
          # artifact, not something to commit to a permanent branch.
          files=(incoming/*.png incoming/*.mp4)
          if [ ${#files[@]} -eq 0 ]; then echo "nothing captured"; exit 0; fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin evidence && git checkout evidence || git checkout --orphan evidence
          git rm -rqf . 2>/dev/null || true
          mkdir -p "${DEST}"
          cp "${files[@]}" "${DEST}/"
          git add "${DEST}"
          git commit -qm "evidence: ${{ inputs.target_ref }} (run ${{ github.run_id }})"
          git push -q origin evidence

          BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/evidence/${DEST}"
          {
            echo "### Paste into the PR"
            echo
            for f in "${DEST}"/*; do
              n=$(basename "$f")
              case "$n" in
                *.png) echo "![${n%.*}](${BASE}/${n})" ;;
                # GitHub renders a <video> tag from a raw URL; image syntax will not play it.
                *.mp4) echo "<video src=\"${BASE}/${n}\" controls></video>" ;;
              esac
              echo
            done
          } >> "${GITHUB_STEP_SUMMARY}"
